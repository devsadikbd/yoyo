<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Sick Fits</title>
    <link rel="icon" href="/static/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/css/tailwind.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto Condensed", sans-serif;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 2px;
        background: #dc2626;
        transition: width 0.4s cubic-bezier(1, -0.65, 0, 2.31);
      }
      .nav-link:hover::after {
        width: calc(100% - 2rem);
      }
      .nav-link::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 2px;
        height: 100%;
        background: #d1d5db;
        transform: skewX(-20deg);
      }
      .sick-fieldset::before {
        content: "";
        display: block;
        height: 10px;
        background: linear-gradient(
          to right,
          #ff3019 0%,
          #e2b04a 50%,
          #ff3019 100%
        );
      }
      @keyframes loading {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 100% 100%;
        }
      }
      .sick-fieldset[aria-busy="true"]::before {
        background-size: 50% auto;
        animation: loading 0.5s linear infinite;
      }
    </style>
  </head>
  <body class="bg-white text-[#393939]">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
      <div class="flex items-stretch justify-between px-6 py-4">
        <div class="text-5xl ml-6 relative z-10 self-center">
          <a
            href="/"
            class="bg-red-600 text-white uppercase px-6 py-1 no-underline font-black skew-x-[-20deg] inline-block"
          >
            Sick Fits
          </a>
        </div>
        <nav
          id="main-nav"
          class="flex flex-wrap justify-end text-2xl font-black uppercase"
        ></nav>
      </div>
    </header>

    <div class="max-w-4xl mx-auto px-6 py-10">
      <div class="grid grid-cols-3 gap-8 md:grid-cols-3 sm:grid-cols-1">
        <!-- Sign In -->
        <div>
          <h2 class="text-3xl font-black mb-4">Sign Into Your Account</h2>
          <div
            id="login-error"
            class="hidden p-4 border-l-4 border-red-600 bg-red-50 text-red-700 mb-4"
          ></div>
          <form
            id="login-form"
            class="shadow-[0_0_5px_3px_rgba(0,0,0,0.05)] bg-black/[0.02] border-4 border-white p-5 text-xl font-semibold"
          >
            <fieldset id="login-fs" class="sick-fieldset border-0 p-0">
              <label class="block mb-4">
                <span
                  class="block mb-1 text-sm font-bold uppercase tracking-wide"
                  >Email</span
                >
                <input
                  name="email"
                  type="email"
                  required
                  placeholder="your@email.com"
                  autocomplete="email"
                  class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600"
                />
              </label>
              <label class="block mb-4">
                <span
                  class="block mb-1 text-sm font-bold uppercase tracking-wide"
                  >Password</span
                >
                <input
                  name="password"
                  type="password"
                  required
                  autocomplete="current-password"
                  class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600"
                />
              </label>
              <button
                type="submit"
                class="bg-red-600 text-white border-0 text-2xl font-semibold px-5 py-2 cursor-pointer disabled:opacity-50"
              >
                Sign In!
              </button>
            </fieldset>
          </form>
        </div>

        <!-- Sign Up -->
        <div>
          <h2 class="text-3xl font-black mb-4">Sign Up For an Account</h2>
          <div
            id="signup-error"
            class="hidden p-4 border-l-4 border-red-600 bg-red-50 text-red-700 mb-4"
          ></div>
          <form
            id="signup-form"
            class="shadow-[0_0_5px_3px_rgba(0,0,0,0.05)] bg-black/[0.02] border-4 border-white p-5 text-xl font-semibold"
          >
            <fieldset id="signup-fs" class="sick-fieldset border-0 p-0">
              <label class="block mb-4">
                <span
                  class="block mb-1 text-sm font-bold uppercase tracking-wide"
                  >Your Name</span
                >
                <input
                  name="name"
                  type="text"
                  required
                  placeholder="Your Name"
                  autocomplete="name"
                  class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600"
                />
              </label>
              <label class="block mb-4">
                <span
                  class="block mb-1 text-sm font-bold uppercase tracking-wide"
                  >Email</span
                >
                <input
                  name="email"
                  type="email"
                  required
                  placeholder="your@email.com"
                  autocomplete="email"
                  class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600"
                />
              </label>
              <label class="block mb-4">
                <span
                  class="block mb-1 text-sm font-bold uppercase tracking-wide"
                  >Password</span
                >
                <input
                  name="password"
                  type="password"
                  required
                  minlength="6"
                  autocomplete="new-password"
                  class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600"
                />
              </label>
              <button
                type="submit"
                class="bg-red-600 text-white border-0 text-2xl font-semibold px-5 py-2 cursor-pointer disabled:opacity-50"
              >
                Sign Up!
              </button>
            </fieldset>
          </form>
        </div>

        <!-- Request Reset -->
        <div>
          <h2 class="text-3xl font-black mb-4">Request a Password Reset</h2>
          <form
            id="reset-form"
            class="shadow-[0_0_5px_3px_rgba(0,0,0,0.05)] bg-black/[0.02] border-4 border-white p-5 text-xl font-semibold"
          >
            <fieldset class="sick-fieldset border-0 p-0">
              <label class="block mb-4">
                <span
                  class="block mb-1 text-sm font-bold uppercase tracking-wide"
                  >Email</span
                >
                <input
                  name="email"
                  type="email"
                  placeholder="your@email.com"
                  class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600"
                />
              </label>
              <button
                type="submit"
                class="bg-red-600 text-white border-0 text-2xl font-semibold px-5 py-2 cursor-pointer"
              >
                Request Reset
              </button>
            </fieldset>
          </form>
        </div>
      </div>
    </div>

    <script type="module">
      import { api, renderNav, toast } from "/js/utils.js";
      renderNav("main-nav");

      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const errEl = document.getElementById("login-error");
          errEl.classList.add("hidden");
          const data = Object.fromEntries(new FormData(e.target));
          const fs = document.getElementById("login-fs");
          fs.setAttribute("aria-busy", "true");
          fs.disabled = true;
          try {
            const { token, user } = await api("/auth/login", {
              method: "POST",
              body: JSON.stringify(data),
            });
            localStorage.setItem("token", token);
            localStorage.setItem("user", JSON.stringify(user));
            window.location.href = "/";
          } catch (err) {
            errEl.textContent = `Error: ${err.message}`;
            errEl.classList.remove("hidden");
            fs.removeAttribute("aria-busy");
            fs.disabled = false;
          }
        });

      document
        .getElementById("signup-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const errEl = document.getElementById("signup-error");
          errEl.classList.add("hidden");
          const data = Object.fromEntries(new FormData(e.target));
          const fs = document.getElementById("signup-fs");
          fs.setAttribute("aria-busy", "true");
          fs.disabled = true;
          try {
            const { token, user } = await api("/auth/signup", {
              method: "POST",
              body: JSON.stringify(data),
            });
            localStorage.setItem("token", token);
            localStorage.setItem("user", JSON.stringify(user));
            window.location.href = "/";
          } catch (err) {
            errEl.textContent = `Error: ${err.message}`;
            errEl.classList.remove("hidden");
            fs.removeAttribute("aria-busy");
            fs.disabled = false;
          }
        });

      document.getElementById("reset-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const fs = e.target.querySelector("fieldset");
        fs.disabled = true;
        try {
          const res = await api("/auth/request-reset", {
            method: "POST",
            body: JSON.stringify(data),
          });
          toast(res.message);
          e.target.reset();
        } catch (err) {
          toast(`Error: ${err.message}`, true);
        } finally {
          fs.disabled = false;
        }
      });
    </script>
  </body>
</html>
