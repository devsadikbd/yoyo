<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Orders — Sick Fits</title>
  <link rel="icon" href="/static/favicon.png" type="image/png"/>
  <link rel="stylesheet" href="/css/tailwind.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Roboto Condensed', sans-serif; }
    .nav-link::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:#dc2626; transition:width 0.4s cubic-bezier(1,-0.65,0,2.31); }
    .nav-link:hover::after { width:calc(100% - 2rem); }
    .nav-link::before { content:''; position:absolute; left:0; top:0; width:2px; height:100%; background:#d1d5db; transform:skewX(-20deg); }
  </style>
</head>
<body class="bg-white text-[#393939]">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="flex items-stretch justify-between px-6 py-4">
      <div class="text-5xl ml-6 relative z-10 self-center">
        <a href="/" class="bg-red-600 text-white uppercase px-6 py-1 no-underline font-black skew-x-[-20deg] inline-block">
          Sick Fits
        </a>
      </div>
      <nav id="main-nav" class="flex flex-wrap justify-end text-2xl font-black uppercase"></nav>
    </div>
  </header>
  <div class="max-w-4xl mx-auto px-6 py-10">
    <h1 class="bg-red-600 text-white inline-block px-1.5 py-1 text-4xl font-black -skew-x-3 mb-8">Your Orders</h1>
    <ul id="orders-list" class="p-0 list-none space-y-8 mt-8"></ul>
  </div>
  <script type="module">
    import { api, isLoggedIn, formatPrice, renderNav, updateCartBadge } from '/js/utils.js'
    renderNav('main-nav')
    updateCartBadge()

    const list = document.getElementById('orders-list')
    if (!isLoggedIn()) {
      list.innerHTML = `<li class="p-4 border-l-4 border-red-600 bg-red-50">
        Please <a href="/pages/login.html" class="underline">sign in</a> to view your orders.</li>`
    } else {
      api('/orders').then(orders => {
        if (!orders.length) {
          list.innerHTML = `<li class="text-center text-2xl py-12 text-gray-400">No orders yet. <a href="/" class="underline text-red-600">Start shopping →</a></li>`
          return
        }
        const statusColors = {
          PENDING:    'bg-yellow-100 text-yellow-800',
          PROCESSING: 'bg-blue-100 text-blue-800',
          SHIPPED:    'bg-purple-100 text-purple-800',
          DELIVERED:  'bg-green-100 text-green-800',
        }
        list.innerHTML = orders.map(order => `
          <li class="border border-gray-100 shadow-[0_12px_24px_0_rgba(0,0,0,0.09)] border-t-[10px] border-t-red-600 p-6">
            <div class="flex flex-wrap items-center justify-between gap-4 border-b border-gray-100 pb-5 mb-5">
              <div>
                <p class="m-0 text-3xl font-black">${formatPrice(order.total)}</p>
                <p class="m-0 text-sm text-gray-400">${new Date(order.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</p>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-sm px-3 py-1 rounded font-bold uppercase ${statusColors[order.status] || statusColors.PENDING}">
                  ${order.status}
                </span>
                <span class="text-sm text-gray-400">${order.items.reduce((s,i)=>s+i.quantity,0)} items</span>
              </div>
            </div>
            <div class="grid gap-4" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr))">
              ${order.items.map(i => `
                <div class="border border-gray-100 bg-white p-3">
                  ${i.product.imageUrl
                    ? `<img src="${i.product.imageUrl}" alt="${i.product.name}" class="w-full h-[180px] object-cover border border-gray-200"/>`
                    : `<div class="w-full h-[180px] bg-gray-100 border border-gray-200"></div>`
                  }
                  <p class="text-sm font-bold mt-1 mb-0">${i.product.name}</p>
                  <p class="text-sm text-gray-500 m-0">${formatPrice(i.price)} &times; ${i.quantity}</p>
                </div>`).join('')}
            </div>
          </li>`).join('')
      }).catch(err => {
        list.innerHTML = `<li class="p-4 border-l-4 border-red-600 bg-red-50"><strong>Error:</strong> ${err.message}</li>`
      })
    }
  </script>
</body>
</html>
