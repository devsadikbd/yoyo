<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Sick Fits</title>
  <link rel="icon" href="/static/favicon.png" type="image/png"/>
  <link rel="stylesheet" href="/css/tailwind.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Roboto Condensed', sans-serif; }
    .nav-link::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:#dc2626; transition:width 0.4s cubic-bezier(1,-0.65,0,2.31); }
    .nav-link:hover::after { width:calc(100% - 2rem); }
    .nav-link::before { content:''; position:absolute; left:0; top:0; width:2px; height:100%; background:#d1d5db; transform:skewX(-20deg); }
  </style>
</head>
<body class="bg-white text-[#393939]">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="flex items-stretch justify-between px-6 py-4">
      <div class="text-5xl ml-6 relative z-10 self-center">
        <a href="/" class="bg-red-600 text-white uppercase px-6 py-1 no-underline font-black skew-x-[-20deg] inline-block">
          Sick Fits
        </a>
      </div>
      <nav id="main-nav" class="flex flex-wrap justify-end text-2xl font-black uppercase"></nav>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-6 py-10" id="product-container">
    <p class="text-center text-2xl py-12 text-gray-400">Loading...</p>
  </div>

  <script type="module">
    import { api, getUser, isLoggedIn, toast, formatPrice, renderNav, updateCartBadge } from '/js/utils.js'
    renderNav('main-nav')
    updateCartBadge()

    const id = new URLSearchParams(location.search).get('id')
    if (!id) {
      document.getElementById('product-container').innerHTML =
        '<div class="p-4 border-l-4 border-red-600 bg-red-50"><p><strong>Error:</strong> No product ID.</p></div>'
    } else {
      api(`/products/${id}`).then(p => {
        document.title = `${p.name} — Sick Fits`
        document.getElementById('product-container').innerHTML = `
          <div class="grid grid-cols-2 gap-8 min-h-[600px] items-start">
            <div>
              ${p.imageUrl
                ? `<img src="${p.imageUrl}" class="w-full h-[500px] object-cover" alt="${p.name}"/>`
                : `<div class="w-full h-[500px] bg-gray-100 flex items-center justify-center text-gray-300 text-2xl">No Image</div>`
              }
            </div>
            <div class="p-4">
              <h2 class="text-5xl font-black mt-0 mb-4">${p.name}</h2>
              <span class="bg-red-600 text-white font-semibold px-2 py-1 text-3xl inline-block rotate-3 mb-6 leading-none">
                ${formatPrice(p.price)}
              </span>
              <p class="text-xl leading-8 font-light mt-4">${p.description}</p>
              <p class="text-base ${p.stock > 0 ? 'text-gray-500' : 'text-red-600 font-bold'}">
                ${p.stock > 0 ? `${p.stock} in stock` : 'Sold Out!'}
              </p>
              <div class="flex gap-4 mt-6 flex-wrap">
                ${p.stock > 0
                  ? `<button id="add-btn" onclick="addToCart()"
                       class="bg-red-600 text-white uppercase text-2xl font-medium px-6 py-3 -skew-x-2 border-0 cursor-pointer hover:opacity-85 transition-opacity disabled:opacity-50">
                       + Add To Cart
                     </button>`
                  : `<button disabled class="bg-red-600 text-white uppercase text-2xl font-medium px-6 py-3 -skew-x-2 border-0 opacity-50 cursor-not-allowed">Sold Out</button>`
                }
                ${getUser()?.role === 'ADMIN'
                  ? `<a href="/pages/sell.html?id=${p.id}"
                       class="bg-[#393939] text-white uppercase text-2xl font-medium px-6 py-3 -skew-x-2 no-underline hover:opacity-85 transition-opacity inline-block">
                       Edit Item ✏️
                     </a>`
                  : ''
                }
              </div>
            </div>
          </div>`

        window.addToCart = async () => {
          if (!isLoggedIn()) { window.location.href = '/pages/login.html'; return }
          const btn = document.getElementById('add-btn')
          btn.disabled = true; btn.textContent = 'Adding...'
          try {
            await api('/cart', { method: 'POST', body: JSON.stringify({ productId: id }) })
            toast('Added to cart! 🛒')
            updateCartBadge()
            btn.textContent = 'Added! ✓'
            setTimeout(() => { btn.disabled = false; btn.textContent = '+ Add To Cart' }, 1500)
          } catch(err) {
            toast(err.message, 'error')
            btn.disabled = false; btn.textContent = '+ Add To Cart'
          }
        }
      }).catch(err => {
        document.getElementById('product-container').innerHTML =
          `<div class="p-4 border-l-4 border-red-600 bg-red-50"><p><strong>Shoot!</strong> ${err.message}</p></div>`
      })
    }
  </script>
</body>
</html>
