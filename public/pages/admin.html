<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Sick Fits</title>
  <link rel="icon" href="/static/favicon.png" type="image/png"/>
  <link rel="stylesheet" href="/css/tailwind.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Roboto Condensed', sans-serif; }
    .nav-link::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:#dc2626; transition:width 0.4s cubic-bezier(1,-0.65,0,2.31); }
    .nav-link:hover::after { width:calc(100% - 2rem); }
    .nav-link::before { content:''; position:absolute; left:0; top:0; width:2px; height:100%; background:#d1d5db; transform:skewX(-20deg); }
    .metric-card::before { content:''; display:block; height:10px; background:linear-gradient(to right,#ff3019 0%,#e2b04a 50%,#ff3019 100%); }
  </style>
</head>
<body class="bg-white text-[#393939]">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="flex items-stretch justify-between px-6 py-4">
      <div class="text-5xl ml-6 relative z-10 self-center">
        <a href="/" class="bg-red-600 text-white uppercase px-6 py-1 no-underline font-black skew-x-[-20deg] inline-block">
          Sick Fits
        </a>
      </div>
      <nav id="main-nav" class="flex flex-wrap justify-end text-2xl font-black uppercase"></nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10" id="admin-root">
    <p class="text-center text-2xl py-12 text-gray-400">Loading dashboard...</p>
  </main>

  <script type="module">
    import { api, getUser, isLoggedIn, renderNav, updateCartBadge, formatPrice, toast } from '/js/utils.js'

    renderNav('main-nav')
    updateCartBadge()

    const root = document.getElementById('admin-root')

    if (!isLoggedIn()) {
      root.innerHTML = `<div class="p-4 border-l-4 border-red-600 bg-red-50">
        <p><strong>Please sign in.</strong> Admin access requires an authenticated account.</p>
      </div>`
    } else if (getUser()?.role !== 'ADMIN') {
      root.innerHTML = `<div class="p-4 border-l-4 border-red-600 bg-red-50">
        <p><strong>Access Denied.</strong> Admins only.</p>
      </div>`
    } else {
      root.innerHTML = `
        <section class="mb-10">
          <h1 class="bg-red-600 text-white inline-block px-1.5 py-1 text-4xl font-black -skew-x-3 mb-4">Admin Dashboard</h1>
          <p class="text-xl text-gray-500">Control products, orders, and store activity from one place.</p>
        </section>

        <section id="metrics" class="grid gap-6 md:grid-cols-4 mb-10"></section>

        <section class="grid gap-10 xl:grid-cols-[1.2fr_1fr]">
          <div>
            <div class="flex items-center justify-between mb-4 gap-4 flex-wrap">
              <h2 class="text-3xl font-black m-0">Products</h2>
              <a href="/pages/sell.html" class="bg-red-600 text-white no-underline px-4 py-2 text-xl font-bold">+ New Product</a>
            </div>
            <div id="products-panel" class="border border-gray-200 bg-white shadow-[0_12px_24px_0_rgba(0,0,0,0.06)]"></div>
          </div>

          <div>
            <h2 class="text-3xl font-black mb-4">Recent Orders</h2>
            <div id="orders-panel" class="border border-gray-200 bg-white shadow-[0_12px_24px_0_rgba(0,0,0,0.06)]"></div>
          </div>
        </section>
      `

      loadDashboard()
    }

    async function loadDashboard() {
      const metricsEl = document.getElementById('metrics')
      const productsEl = document.getElementById('products-panel')
      const ordersEl = document.getElementById('orders-panel')

      productsEl.innerHTML = `<div class="p-6 text-xl text-gray-400">Loading products...</div>`
      ordersEl.innerHTML = `<div class="p-6 text-xl text-gray-400">Loading orders...</div>`

      try {
        const [{ products }, orders] = await Promise.all([
          api('/products?limit=100'),
          api('/orders/all')
        ])

        renderMetrics(metricsEl, products, orders)
        renderProducts(productsEl, products)
        renderOrders(ordersEl, orders)
      } catch (err) {
        const errorHtml = `<div class="p-4 border-l-4 border-red-600 bg-red-50 text-red-700">${err.message}</div>`
        metricsEl.innerHTML = ''
        productsEl.innerHTML = errorHtml
        ordersEl.innerHTML = errorHtml
      }
    }

    function renderMetrics(el, products, orders) {
      const inventoryValue = products.reduce((sum, p) => sum + (p.price * p.stock), 0)
      const lowStock = products.filter(p => p.stock > 0 && p.stock <= 3).length
      const revenue = orders.reduce((sum, o) => sum + o.total, 0)

      const metrics = [
        { label: 'Products', value: products.length },
        { label: 'Inventory', value: formatPrice(inventoryValue) },
        { label: 'Orders', value: orders.length },
        { label: 'Revenue', value: formatPrice(revenue) },
        { label: 'Low Stock', value: lowStock }
      ]

      el.innerHTML = metrics.map(metric => `
        <article class="metric-card border border-gray-200 bg-white shadow-[0_12px_24px_0_rgba(0,0,0,0.06)] p-5">
          <p class="text-sm font-bold uppercase tracking-[0.2em] text-gray-500 mt-4 mb-2">${metric.label}</p>
          <p class="text-4xl font-black m-0">${metric.value}</p>
        </article>
      `).join('')
    }

    function renderProducts(el, products) {
      if (!products.length) {
        el.innerHTML = `<div class="p-6 text-xl text-gray-400">No products yet.</div>`
        return
      }

      el.innerHTML = `
        <div class="grid grid-cols-[1.2fr_120px_120px_180px] gap-x-4 px-5 py-4 border-b border-gray-200 text-sm uppercase tracking-wide font-bold text-gray-500">
          <div>Product</div>
          <div>Price</div>
          <div>Stock</div>
          <div>Actions</div>
        </div>
        ${products.map(product => `
          <div class="grid grid-cols-[1.2fr_120px_120px_180px] gap-x-4 items-center px-5 py-4 border-b border-gray-100 last:border-b-0">
            <div class="min-w-0">
              <p class="text-xl font-bold m-0 truncate">${product.name}</p>
              <p class="text-sm text-gray-500 m-0 truncate">${product.description}</p>
            </div>
            <div class="text-lg font-bold">${formatPrice(product.price)}</div>
            <div class="text-lg ${product.stock === 0 ? 'text-red-600 font-black' : product.stock <= 3 ? 'text-amber-600 font-black' : ''}">
              ${product.stock}
            </div>
            <div class="flex gap-2 flex-wrap">
              <a href="/pages/sell.html?id=${product.id}" class="bg-black text-white no-underline px-3 py-2 text-sm font-bold">Edit</a>
              <button data-delete-product="${product.id}" data-product-name="${escapeAttr(product.name)}" class="bg-red-600 text-white px-3 py-2 text-sm font-bold">Delete</button>
            </div>
          </div>
        `).join('')}
      `

      el.querySelectorAll('[data-delete-product]').forEach(button => {
        button.addEventListener('click', async () => {
          const id = button.getAttribute('data-delete-product')
          const name = button.getAttribute('data-product-name')
          if (!confirm(`Delete "${name}"? This cannot be undone.`)) return
          button.disabled = true
          try {
            await api(`/products/${id}`, { method: 'DELETE' })
            toast(`"${name}" deleted`)
            loadDashboard()
          } catch (err) {
            toast(err.message, 'error')
            button.disabled = false
          }
        })
      })
    }

    function renderOrders(el, orders) {
      if (!orders.length) {
        el.innerHTML = `<div class="p-6 text-xl text-gray-400">No orders yet.</div>`
        return
      }

      el.innerHTML = orders.map(order => `
        <article class="p-5 border-b border-gray-100 last:border-b-0">
          <div class="flex items-start justify-between gap-4 mb-4">
            <div>
              <p class="text-lg font-black m-0">${order.user.name}</p>
              <p class="text-sm text-gray-500 m-0">${order.user.email}</p>
              <p class="text-sm text-gray-500 m-0">${new Date(order.createdAt).toLocaleString()}</p>
            </div>
            <div class="text-right">
              <p class="text-2xl font-black m-0">${formatPrice(order.total)}</p>
              <p class="text-sm uppercase tracking-wide text-gray-500 m-0">${order.items.length} item${order.items.length !== 1 ? 's' : ''}</p>
            </div>
          </div>
          <div class="mb-4 space-y-3">
            ${order.items.map(item => `
              <div class="grid grid-cols-[64px_1fr] gap-3 items-center">
                ${item.product.imageUrl
                  ? `<img src="${item.product.imageUrl}" alt="${item.product.name}" class="w-16 h-16 object-cover border border-gray-200"/>`
                  : `<div class="w-16 h-16 bg-gray-100 border border-gray-200"></div>`
                }
                <div>
                  <p class="text-sm font-bold text-[#393939] m-0">${item.product.name}</p>
                  <p class="text-sm text-gray-500 m-0">${formatPrice(item.price)} x ${item.quantity}</p>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="flex items-center justify-between gap-4 flex-wrap">
            <span class="text-sm font-bold uppercase tracking-wide text-gray-500">Status</span>
            <select data-order-status="${order.id}" class="border border-gray-300 px-3 py-2 text-sm font-bold">
              ${['PENDING','PROCESSING','SHIPPED','DELIVERED'].map(status => `
                <option value="${status}" ${order.status === status ? 'selected' : ''}>${status}</option>
              `).join('')}
            </select>
          </div>
        </article>
      `).join('')

      el.querySelectorAll('[data-order-status]').forEach(select => {
        select.addEventListener('change', async () => {
          const id = select.getAttribute('data-order-status')
          const status = select.value
          select.disabled = true
          try {
            await api(`/orders/${id}/status`, {
              method: 'PATCH',
              body: JSON.stringify({ status })
            })
            toast(`Order marked ${status}`)
          } catch (err) {
            toast(err.message, 'error')
          } finally {
            select.disabled = false
          }
        })
      })
    }

    function escapeAttr(value) {
      return value.replaceAll('&', '&amp;').replaceAll('"', '&quot;')
    }
  </script>
</body>
</html>
