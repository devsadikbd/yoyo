<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sell — Sick Fits</title>
  <link rel="icon" href="/static/favicon.png" type="image/png"/>
  <link rel="stylesheet" href="/css/tailwind.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Roboto Condensed', sans-serif; }
    .nav-link::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:#dc2626; transition:width 0.4s cubic-bezier(1,-0.65,0,2.31); }
    .nav-link:hover::after { width:calc(100% - 2rem); }
    .nav-link::before { content:''; position:absolute; left:0; top:0; width:2px; height:100%; background:#d1d5db; transform:skewX(-20deg); }
    .sick-fieldset::before { content:''; display:block; height:10px; background:linear-gradient(to right,#ff3019 0%,#e2b04a 50%,#ff3019 100%); }
    @keyframes loading { from{background-position:0 0} to{background-position:100% 100%} }
    .sick-fieldset[aria-busy="true"]::before { background-size:50% auto; animation:loading 0.5s linear infinite; }
  </style>
</head>
<body class="bg-white text-[#393939]">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="flex items-stretch justify-between px-6 py-4">
      <div class="text-5xl ml-6 relative z-10 self-center">
        <a href="/" class="bg-red-600 text-white uppercase px-6 py-1 no-underline font-black skew-x-[-20deg] inline-block">
          Sick Fits
        </a>
      </div>
      <nav id="main-nav" class="flex flex-wrap justify-end text-2xl font-black uppercase"></nav>
    </div>
  </header>
  <div class="max-w-2xl mx-auto px-6 py-10">
    <h1 id="form-heading" class="bg-red-600 text-white inline-block px-1.5 py-1 text-4xl font-black -skew-x-3 mb-8">Sell an Item</h1>
    <div id="form-error" class="hidden p-4 border-l-4 border-red-600 bg-red-50 text-red-700 mb-6"></div>
    <form id="sell-form" class="shadow-[0_0_5px_3px_rgba(0,0,0,0.05)] bg-black/[0.02] border-4 border-white p-5">
      <fieldset id="sell-fs" class="sick-fieldset border-0 p-0">
        <label class="block mb-4 font-semibold text-lg">
          <span class="block mb-1 text-sm font-bold uppercase tracking-wide">Image</span>
          <input id="f-image" name="image" type="file" accept="image/*"
            class="w-full text-base border border-[#393939] px-2 py-1.5 cursor-pointer bg-white"/>
        </label>
        <img id="img-preview" class="hidden max-w-xs max-h-48 object-cover mb-4 border border-gray-200"/>
        <label class="block mb-4 font-semibold text-lg">
          <span class="block mb-1 text-sm font-bold uppercase tracking-wide">Item Name</span>
          <input id="f-name" name="name" type="text" required placeholder="Name"
            class="w-full px-2 py-1.5 text-base border border-[#393939] focus:outline-none focus:border-red-600"/>
        </label>
        <div class="grid grid-cols-2 gap-4">
          <label class="block mb-4 font-semibold text-lg">
            <span class="block mb-1 text-sm font-bold uppercase tracking-wide">Price ($)</span>
            <input id="f-price" name="price" type="number" step="0.01" min="0" required placeholder="0.00"
              class="w-full px-2 py-1.5 text-base border border-[#393939] focus:outline-none focus:border-red-600"/>
          </label>
          <label class="block mb-4 font-semibold text-lg">
            <span class="block mb-1 text-sm font-bold uppercase tracking-wide">Stock</span>
            <input id="f-stock" name="stock" type="number" min="0" value="0" required
              class="w-full px-2 py-1.5 text-base border border-[#393939] focus:outline-none focus:border-red-600"/>
          </label>
        </div>
        <label class="block mb-4 font-semibold text-lg">
          <span class="block mb-1 text-sm font-bold uppercase tracking-wide">Description</span>
          <textarea id="f-desc" name="description" required rows="4" placeholder="Describe the item..."
            class="w-full px-2 py-1.5 text-base border border-[#393939] focus:outline-none focus:border-red-600 resize-y min-h-[100px]"></textarea>
        </label>
        <input type="hidden" id="edit-id"/>
        <div class="flex gap-3 flex-wrap">
          <button type="submit" id="submit-btn"
            class="bg-red-600 text-white border-0 text-2xl font-semibold px-5 py-2 cursor-pointer disabled:opacity-50">
            + Add Item!
          </button>
          <button type="button" id="cancel-btn" onclick="resetForm()"
            class="hidden bg-gray-200 text-[#393939] border-0 text-2xl font-semibold px-5 py-2 cursor-pointer hover:bg-gray-300 transition-colors">
            Cancel
          </button>
        </div>
      </fieldset>
    </form>
  </div>
  <script type="module">
    import { api, getUser, toast, renderNav } from '/js/utils.js'
    renderNav('main-nav')

    const user = getUser()
    const isAdmin = user?.role === 'ADMIN'

    if (!isAdmin) {
      document.querySelector('.max-w-2xl').innerHTML =
        '<div class="p-4 border-l-4 border-red-600 bg-red-50"><p><strong>Access Denied.</strong> Admins only.</p></div>'
    } else {
      const editId = new URLSearchParams(location.search).get('id')
      if (editId) {
        document.getElementById('form-heading').textContent = 'Edit Item'
        document.getElementById('submit-btn').textContent   = 'Save Changes!'
        api(`/products/${editId}`).then(p => {
          document.getElementById('f-name').value  = p.name
          document.getElementById('f-price').value = (p.price / 100).toFixed(2)
          document.getElementById('f-stock').value = p.stock
          document.getElementById('f-desc').value  = p.description
          if (p.imageUrl) {
            const img = document.getElementById('img-preview')
            img.src = p.imageUrl; img.classList.remove('hidden')
          }
          document.getElementById('cancel-btn').classList.remove('hidden')
        })
      }

      document.getElementById('f-image').addEventListener('change', e => {
        const file = e.target.files[0]
        const img  = document.getElementById('img-preview')
        if (file) { img.src = URL.createObjectURL(file); img.classList.remove('hidden') }
        else { img.classList.add('hidden') }
      })

      document.getElementById('sell-form').addEventListener('submit', async e => {
        e.preventDefault()
        const errEl = document.getElementById('form-error')
        errEl.classList.add('hidden')
        const fd = new FormData()
        fd.append('name',        document.getElementById('f-name').value)
        fd.append('description', document.getElementById('f-desc').value)
        fd.append('price',       document.getElementById('f-price').value)
        fd.append('stock',       document.getElementById('f-stock').value)
        const img = document.getElementById('f-image').files[0]
        if (img) fd.append('image', img)
        const fs  = document.getElementById('sell-fs')
        const btn = document.getElementById('submit-btn')
        fs.setAttribute('aria-busy','true'); fs.disabled = true; btn.textContent = 'Saving...'
        try {
          if (editId) { await api(`/products/${editId}`, { method:'PATCH', body:fd }); toast('Item updated!') }
          else        { await api('/products',            { method:'POST',  body:fd }); toast('Item added! 🎉') }
          window.location.href = '/'
        } catch(err) {
          errEl.textContent = `Error: ${err.message}`
          errEl.classList.remove('hidden')
        } finally {
          fs.removeAttribute('aria-busy'); fs.disabled = false
          btn.textContent = editId ? 'Save Changes!' : '+ Add Item!'
        }
      })

      window.resetForm = () => {
        document.getElementById('sell-form').reset()
        document.getElementById('edit-id').value = ''
        document.getElementById('form-heading').textContent = 'Sell an Item'
        document.getElementById('submit-btn').textContent   = '+ Add Item!'
        document.getElementById('cancel-btn').classList.add('hidden')
        document.getElementById('form-error').classList.add('hidden')
        document.getElementById('img-preview').classList.add('hidden')
      }
    }
  </script>
</body>
</html>
