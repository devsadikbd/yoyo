<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Sick Fits</title>
    <link rel="icon" href="/static/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; }
        .sick-fieldset::before {
            content: '';
            display: block;
            height: 10px;
            background: linear-gradient(to right, #ff3019 0%, #e2b04a 50%, #ff3019 100%);
        }
    </style>
</head>
<body class="bg-white text-[#393939]">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="flex items-stretch justify-between px-6 py-4">
            <div class="text-5xl ml-6 relative z-10 self-center">
                <a href="/" class="bg-red-600 text-white uppercase px-6 py-1 no-underline font-black skew-x-[-20deg] inline-block">
                    Sick Fits
                </a>
            </div>
            <nav id="main-nav" class="flex flex-wrap justify-end text-2xl font-black uppercase"></nav>
        </div>
    </header>

    <div class="max-w-xl mx-auto px-6 py-10">
        <h2 class="text-3xl font-black mb-4">Reset Your Password</h2>
        <div id="error" class="hidden p-4 border-l-4 border-red-600 bg-red-50 text-red-700 mb-4"></div>
        <div id="success" class="hidden p-4 border-l-4 border-green-600 bg-green-50 text-green-700 mb-4"></div>

        <form id="reset-form" class="shadow-[0_0_5px_3px_rgba(0,0,0,0.05)] bg-black/[0.02] border-4 border-white p-5 text-xl font-semibold">
            <fieldset class="sick-fieldset border-0 p-0">
                <label class="block mb-4">
                    <span class="block mb-1 text-sm font-bold uppercase tracking-wide">New Password</span>
                    <input name="password" type="password" required minlength="6" placeholder="Password"
                        class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600">
                </label>
                <label class="block mb-4">
                    <span class="block mb-1 text-sm font-bold uppercase tracking-wide">Confirm New Password</span>
                    <input id="confirm" type="password" required minlength="6" placeholder="Confirm Password"
                        class="w-full px-2 py-1.5 text-base border border-black focus:outline-none focus:border-red-600">
                </label>
                <button type="submit" class="bg-red-600 text-white border-0 text-2xl font-semibold px-5 py-2 cursor-pointer">
                    Reset Password
                </button>
            </fieldset>
        </form>
    </div>

    <script type="module">
        import { api, renderNav, toast } from '/js/utils.js';
        renderNav('main-nav');

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('error').textContent = 'Invalid or missing reset token.';
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('reset-form').classList.add('hidden');
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('error');
            const succEl = document.getElementById('success');
            errEl.classList.add('hidden');
            
            const password = e.target.password.value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                errEl.textContent = 'Passwords do not match.';
                errEl.classList.remove('hidden');
                return;
            }

            const fs = e.target.querySelector('fieldset');
            fs.disabled = true;

            try {
                const res = await api('/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({ token, password })
                });
                succEl.textContent = res.message;
                succEl.classList.remove('hidden');
                e.target.classList.add('hidden');
                setTimeout(() => window.location.href = '/pages/login', 3000);
            } catch (err) {
                errEl.textContent = `Error: ${err.message}`;
                errEl.classList.remove('hidden');
                fs.disabled = false;
            }
        });
    </script>
</body>
</html>
