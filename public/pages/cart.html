<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart — Sick Fits</title>
  <link rel="icon" href="/static/favicon.png" type="image/png"/>
  <link rel="stylesheet" href="/css/tailwind.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body { font-family: 'Roboto Condensed', sans-serif; }
    .nav-link::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:#dc2626; transition:width 0.4s cubic-bezier(1,-0.65,0,2.31); }
    .nav-link:hover::after { width:calc(100% - 2rem); }
    .nav-link::before { content:''; position:absolute; left:0; top:0; width:2px; height:100%; background:#d1d5db; transform:skewX(-20deg); }
    .cart-shell::before { content:''; display:block; height:10px; background:linear-gradient(to right,#ff3019 0%,#e2b04a 50%,#ff3019 100%); }
    #card-element {
      padding: 12px;
      border: 1px solid #000;
      background: white;
    }
  </style>
</head>
<body class="bg-white text-[#393939]">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="flex items-stretch justify-between px-6 py-4">
      <div class="text-5xl ml-6 relative z-10 self-center">
        <a href="/" class="bg-red-600 text-white uppercase px-6 py-1 no-underline font-black skew-x-[-20deg] inline-block">
          Sick Fits
        </a>
      </div>
      <nav id="main-nav" class="flex flex-wrap justify-end text-2xl font-black uppercase"></nav>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="bg-red-600 text-white inline-block px-1.5 py-1 text-4xl font-black -skew-x-3 mb-8">Your Cart</h1>
    <div id="cart-container">
      <p class="text-center text-2xl py-12 text-gray-400">Loading...</p>
    </div>
  </div>

  <script type="module">
    import { api, isLoggedIn, toast, formatPrice, updateCartBadge, renderNav } from '/js/utils.js'

    renderNav('main-nav')
    updateCartBadge()

    let stripe;
    let card;

    if (!isLoggedIn()) {
      document.getElementById('cart-container').innerHTML = `
        <div class="p-4 border-l-4 border-red-600 bg-red-50 text-red-700 mb-4">
          <p><strong>Please sign in</strong> to view your cart.</p>
        </div>
        <a href="/pages/login.html" class="inline-block bg-red-600 text-white no-underline px-5 py-3 text-2xl font-semibold">Sign In</a>`
    } else {
      loadCart()
    }

    async function loadCart() {
      try {
        const { items, total } = await api('/cart')
        updateCartBadge()

        if (!items.length) {
          document.getElementById('cart-container').innerHTML = `
            <div class="border border-gray-100 shadow-[0_12px_24px_0_rgba(0,0,0,0.09)] p-8">
              <p class="text-3xl font-black m-0 mb-3">Your cart is empty!</p>
              <a href="/" class="text-red-600 text-xl font-bold no-underline">Keep shopping →</a>
            </div>`
          return
        }

        document.getElementById('cart-container').innerHTML = `
          <div class="grid gap-8 lg:grid-cols-[1.5fr_420px] items-start">
            <section class="cart-shell shadow-[0_12px_24px_0_rgba(0,0,0,0.09)] bg-black/[0.02] border-4 border-white">
              <div id="cart-items" class="p-5">
                ${items.map(item => `
                  <article class="grid gap-4 grid-cols-[110px_1fr_auto] items-center py-5 border-b border-gray-200 last:border-b-0" id="ci-${item.id}">
                    ${item.product.imageUrl
                      ? `<img src="${item.product.imageUrl}" alt="${item.product.name}" class="w-[110px] h-[110px] object-cover border border-gray-200"/>`
                      : `<div class="w-[110px] h-[110px] bg-gray-100 border border-gray-200"></div>`
                    }
                    <div class="min-w-0">
                      <h3 class="m-0 text-3xl font-black truncate">${item.product.name}</h3>
                      <p class="m-0 mt-2 text-lg text-gray-500">${formatPrice(item.product.price)} × ${item.quantity}</p>
                      <p class="m-0 mt-1 text-xl font-bold text-red-600">${formatPrice(item.product.price * item.quantity)}</p>
                      <div class="flex items-center gap-3 mt-4">
                        <button onclick="changeQty('${item.id}',${item.quantity - 1})" class="w-10 h-10 border border-gray-300 bg-white text-2xl font-bold cursor-pointer hover:bg-gray-100">−</button>
                        <span class="min-w-[2rem] text-center text-2xl font-black">${item.quantity}</span>
                        <button onclick="changeQty('${item.id}',${item.quantity + 1})" class="w-10 h-10 border border-gray-300 bg-white text-2xl font-bold cursor-pointer hover:bg-gray-100">+</button>
                      </div>
                    </div>
                    <button onclick="removeItem('${item.id}')" class="self-start bg-transparent border-0 text-5xl leading-none text-gray-300 cursor-pointer hover:text-red-600 transition-colors" title="Remove">&times;</button>
                  </article>`).join('')}
              </div>
            </section>

            <aside class="cart-shell shadow-[0_12px_24px_0_rgba(0,0,0,0.09)] bg-black/[0.02] border-4 border-white">
              <div class="p-5">
                <h2 class="text-4xl font-black mt-0 mb-5">Order Total</h2>
                <ul class="m-0 p-0 list-none space-y-3">
                  ${items.map(item => `
                    <li class="flex items-start justify-between gap-4 text-lg border-b border-gray-200 pb-3">
                      <span>${item.product.name} ×${item.quantity}</span>
                      <span class="font-bold whitespace-nowrap">${formatPrice(item.product.price * item.quantity)}</span>
                    </li>`).join('')}
                  <li class="flex items-center justify-between pt-4 text-2xl font-black">
                    <span>Total</span>
                    <span>${formatPrice(total)}</span>
                  </li>
                </ul>
                
                <div class="mt-8">
                  <h3 class="text-xl font-bold mb-3 uppercase">Payment Details</h3>
                  <div id="card-element"></div>
                  <div id="card-errors" role="alert" class="mt-2 text-red-600 text-sm"></div>
                </div>

                <button class="mt-6 bg-red-600 text-white uppercase text-2xl font-medium px-6 py-3 -skew-x-2 border-0 cursor-pointer transition-opacity hover:opacity-85 w-full disabled:opacity-50" id="checkout-btn" disabled onclick="checkout()">Checkout</button>
              </div>
            </aside>
          </div>`
        
        await initStripe();
      } catch (err) {
        document.getElementById('cart-container').innerHTML = `<div class="p-4 border-l-4 border-red-600 bg-red-50 text-red-700"><p><strong>Error:</strong> ${err.message}</p></div>`
      }
    }

    async function initStripe() {
      try {
        const { publishableKey } = await api('/config/stripe');
        if (!publishableKey || publishableKey.includes('...')) {
           toast('Stripe is not configured correctly.', 'error');
           return;
        }
        stripe = Stripe(publishableKey);
        const elements = stripe.elements();
        card = elements.create('card', {
          style: {
            base: {
              fontSize: '18px',
              fontFamily: '"Roboto Condensed", sans-serif',
            }
          }
        });
        card.mount('#card-element');
        card.on('change', (event) => {
          const displayError = document.getElementById('card-errors');
          displayError.textContent = event.error ? event.error.message : '';
        });
        document.getElementById('checkout-btn').disabled = false;
      } catch (err) {
        console.error('Failed to init Stripe:', err);
      }
    }

    window.changeQty = async (id, qty) => {
      if (qty < 1) return removeItem(id)
      try {
        await api(`/cart/${id}`, { method: 'PATCH', body: JSON.stringify({ quantity: qty }) })
        loadCart()
      } catch (err) {
        toast(err.message, 'error')
      }
    }

    window.removeItem = async (id) => {
      try {
        await api(`/cart/${id}`, { method: 'DELETE' })
        toast('Removed!')
        loadCart()
      } catch (err) {
        toast(err.message, 'error')
      }
    }

    window.checkout = async () => {
      const btn = document.getElementById('checkout-btn')
      btn.disabled = true
      btn.textContent = 'Processing Payment...'
      
      try {
        if (!stripe || !card) throw new Error('Stripe has not loaded yet.');

        const { paymentMethod, error } = await stripe.createPaymentMethod({
          type: 'card',
          card: card,
        });

        if (error) {
          throw new Error(error.message);
        }

        console.log('Payment method created:', paymentMethod.id);

        await api('/orders', { 
          method: 'POST',
          body: JSON.stringify({ paymentMethodId: paymentMethod.id })
        })
        
        toast('Order placed! 🎉')
        window.location.href = '/pages/orders.html'
      } catch (err) {
        toast(err.message, 'error')
        btn.disabled = false
        btn.textContent = 'Checkout'
      }
    }
  </script>
</body>
</html>
